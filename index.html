<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Photobooth</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="glass-header">
        <h1>VibeBooth</h1>
        <p>Capture your moment</p>
      </header>

      <main>
        <!-- Setup View -->
        <section id="setup-view" class="view active">
          <div class="glass-card">
            <h2>Configuration</h2>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
              <div style="flex: 1; min-width: 250px;">
                <div class="control-group">
                  <label for="photo-count">Number of Photos</label>
                  <select id="photo-count">
                    <option value="2">2 Photos</option>
                    <option value="3">3 Photos</option>
                    <option value="4" selected>4 Photos</option>
                    <option value="6">6 Photos</option>
                  </select>
                </div>
                <div class="control-group">
                  <label for="frame-theme">Frame Theme & Elements</label>
                  <select id="frame-theme">
                    <option value="minimalist" selected>Minimalist (Color Only)</option>
                    <option value="cyberpunk">Cyberpunk Neon</option>
                    <option value="cute-animals">Cute Animals</option>
                    <option value="floral">Vintage Floral</option>
                    <option value="party">Party Vibes</option>
                    <option value="custom">Custom Design (Upload)</option>
                  </select>
                </div>
                <div class="control-group" id="custom-frame-upload-group" style="display: none; margin-top: -1rem; margin-bottom: 1rem;">
                  <label for="custom-frame-upload" style="font-size: 0.9rem;">Upload Frame Overlay (PNG)</label>
                  <input type="file" id="custom-frame-upload" accept="image/png, image/jpeg, image/webp" style="font-size: 0.8rem; width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.1); border-radius: 5px; border: 1px dashed rgba(255,255,255,0.3); color: var(--text-primary);" />
                </div>
                <div class="control-group">
                  <label>Frame Base Color</label>
                  <div class="color-swatches" id="color-swatches">
                    <button class="swatch active" data-color="#ffffff" style="background:#ffffff;" title="Classic White"></button>
                    <button class="swatch" data-color="#1a1a2e" style="background:#1a1a2e;" title="Midnight"></button>
                    <button class="swatch" data-color="#f8e8d0" style="background:#f8e8d0;" title="Cream"></button>
                    <button class="swatch" data-color="#ffd6e0" style="background:#ffd6e0;" title="Blush Pink"></button>
                    <button class="swatch" data-color="#d4f0ff" style="background:#d4f0ff;" title="Baby Blue"></button>
                    <button class="swatch" data-color="#e8d5f5" style="background:#e8d5f5;" title="Lavender"></button>
                    <button class="swatch" data-color="#d5f5e3" style="background:#d5f5e3;" title="Mint"></button>
                    <button class="swatch" data-color="#ffeaa7" style="background:#ffeaa7;" title="Butter"></button>
                    <button class="swatch swatch-custom" data-color="custom" title="Custom Color">
                      <span>+</span>
                      <input type="color" id="frame-color" value="#ffffff" />
                    </button>
                  </div>
                </div>
              </div>
              <div class="control-group" style="flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 0;">
                <label style="align-self: flex-start; margin-bottom: 0.5rem;">Live Theme Preview</label>
                <canvas id="theme-preview-canvas" style="width: 100%; max-width: 200px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);"></canvas>
              </div>
            </div>
            <button id="start-btn" class="primary-btn">Start Booth</button>
          </div>
        </section>

        <!-- Camera View -->
        <section id="camera-view" class="view">
          <div class="camera-container glass-card">
            <video id="video" autoplay playsinline></video>
            <div id="countdown" class="countdown hidden">3</div>
            <div id="flash" class="flash hidden"></div>
          </div>
          <div class="status-bar">
            <span id="photo-progress">0 / 4</span>
          </div>
          <button id="capture-btn" class="primary-btn hidden">Ready?</button>
        </section>

        <!-- Preview View -->
        <section id="preview-view" class="view">
          <div class="preview-container glass-card" style="display: flex; gap: 2rem; align-items: flex-start; max-width: 1000px; margin: 0 auto; flex-wrap: wrap;">
            <!-- Left Side: Result Canvas -->
            <div style="flex: 2; min-width: 300px; display: flex; flex-direction: column; align-items: center;">
              <canvas id="output-canvas" style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);"></canvas>
            </div>
            
            <!-- Right Side: Actions and Individual Photos -->
            <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 1.5rem; width: 100%;">
              <div class="actions" style="flex-direction: column; width: 100%;">
                <button id="download-btn" class="primary-btn" style="width: 100%;">Download Strip</button>
                <button id="drive-btn" class="primary-btn" style="width: 100%; background: linear-gradient(135deg, #4285F4, #34A853); box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);">Save to Drive</button>
                <button id="retake-btn" class="secondary-btn" style="width: 100%;">Retake All</button>
              </div>
              
              <div style="background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1);">
                <h3 style="margin-top: 0; font-size: 1.1rem; color: var(--text-primary); text-align: center; margin-bottom: 1rem;">Individual Photos</h3>
                <div id="individual-photos-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem; max-height: 400px; overflow-y: auto; padding-right: 0.5rem;">
                  <!-- Individual photo thumbnails injected here by JS -->
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <!-- Google Identity Services for Drive Upload -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
