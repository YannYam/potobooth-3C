steps:
  # Step 1: Build the Docker image with Nginx (This also builds the Vite app)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vibebooth:latest', '.']

  # Step 4: Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vibebooth:latest']

  # Step 5 (Optional): Deploy directly to Cloud Run
  # Uncomment the lines below to automatically deploy to Cloud Run
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: 'gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - 'vibebooth-service'
  #     - '--image'
  #     - 'gcr.io/$PROJECT_ID/vibebooth:latest'
  #     - '--region'
  #     - 'us-central1'
  #     - '--platform'
  #     - 'managed'
  #     - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/vibebooth:latest'

options:
  logging: CLOUD_LOGGING_ONLY
