steps:
  # Step 1: Install Node.js dependencies
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Build the Vite static site
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Step 3: Build the Docker image with Nginx
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vibebooth:latest', '.']

  # Step 4: Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vibebooth:latest']

  # Step 5 (Optional): Deploy directly to Cloud Run
  # Uncomment the lines below to automatically deploy to Cloud Run
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: 'gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - 'vibebooth-service'
  #     - '--image'
  #     - 'gcr.io/$PROJECT_ID/vibebooth:latest'
  #     - '--region'
  #     - 'us-central1'
  #     - '--platform'
  #     - 'managed'
  #     - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/vibebooth:latest'
